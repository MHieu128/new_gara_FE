services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shinwapro-frontend
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.shinwapro-fe.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.shinwapro-fe.entrypoints=websecure"
      - "traefik.http.routers.shinwapro-fe.tls=true"
      - "traefik.http.services.shinwapro-fe.loadbalancer.server.port=80"
    expose:
      - "80"
    networks:
      - coolify

networks:
  coolify:
    name: coolify
    external: true