services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: garage-frontend
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
